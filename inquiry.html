<!-- Inquiry Form -->

<section class="inquiry">

<h1>
Request A Quote
</h1>

<form id="form">

<input
type="text"
placeholder="Your Name"
required>


<input
type="email"
placeholder="Your Email"
required>


<input
type="tel"
placeholder="Phone Number"
required>


<select required>

<option value="">
Select Fabric
</option>

<option>
Cotton Fabric
</option>

<option>
Silk Fabric
</option>

<option>
Linen Fabric
</option>

<option>
Denim Fabric
</option>

</select>


<input
type="number"
placeholder="Quantity (Meters)"
required>


<textarea

rows="5"

placeholder="Additional Requirements">

</textarea>


<button type="submit">

Submit Inquiry

</button>

</form>


<div id="message">

✔ Inquiry Submitted Successfully

</div>

</section>


<script src="inquiry.js"></script>

</body>
</html>
